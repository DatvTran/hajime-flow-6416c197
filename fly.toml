# Deploy from the repository root (the folder that contains this file and Dockerfile).
# If you run `fly deploy` from the `server/` directory, Fly uses the wrong path and
# looks for server/Dockerfile. Use:  fly deploy .   (from root)  |  fly deploy ..  (from server)
# or:  npm run fly:deploy
app = "hajime-app"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "sh -c 'cd /app/server && npx knex migrate:latest'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
