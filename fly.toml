app = "hajime-app"
primary_region = "nrt"

[build]

[deploy]
  release_command = "sh -c 'cd /app/server && npx knex migrate:latest'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
