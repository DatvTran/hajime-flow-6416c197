name: no-legacy-start

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-no-legacy-start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-no-legacy-start.mjs
