name: Legacy Startup Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-legacy-startup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate startup scripts
        run: node scripts/validate-legacy-startup.mjs
