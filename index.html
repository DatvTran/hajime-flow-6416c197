<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="hsl(220 20% 12%)" />
    <link rel="icon" type="image/png" href="/hajime-logo.png" />
    <title>Hajime — B2B Operations App</title>
    <meta name="description" content="Hajime B2B Operations App — real-time inventory, sales, accounts, manufacturer POs, shipments, and reporting." />
    <meta property="og:title" content="Hajime — B2B Operations App" />
    <meta property="og:description" content="Real-time B2B operations for Hajime: inventory, orders, CRM, production, and logistics in one system." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root">
      <!-- Initial loading state - visible before React mounts -->
      <div id="initial-loader" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, sans-serif; z-index: 99999;">
        <div style="font-size: 28px; margin-bottom: 16px;">⏳</div>
        <div style="font-size: 20px; font-weight: 500;">Hajime Loading...</div>
        <div style="font-size: 14px; opacity: 0.6; margin-top: 12px;">If this persists, check console (F12)</div>
        <div id="loader-status" style="font-size: 12px; opacity: 0.4; margin-top: 20px; font-family: monospace;">HTML loaded</div>
      </div>
    </div>
    <div id="debug-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #0f0; font-family: monospace; font-size: 14px; padding: 20px; z-index: 99999; overflow: auto; display: none;">
      <h2>Debug Console</h2>
      <pre id="debug-log"></pre>
    </div>
    <script>
      // Debug logging
      window.DEBUG_LOG = [];
      const originalLog = console.log;
      const originalError = console.error;
      
      function showDebug(msg) {
        window.DEBUG_LOG.push(msg);
        const overlay = document.getElementById('debug-overlay');
        const log = document.getElementById('debug-log');
        if (overlay && log) {
          overlay.style.display = 'block';
          log.textContent = window.DEBUG_LOG.join('\n');
        }
      }
      
      console.log = function(...args) {
        originalLog.apply(console, args);
        showDebug('[LOG] ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
      };
      
      console.error = function(...args) {
        originalError.apply(console, args);
        showDebug('[ERROR] ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
      };
      
      window.onerror = function(msg, url, line, col, error) {
        showDebug('[FATAL] ' + msg + ' at ' + url + ':' + line + ':' + col);
        showDebug(error?.stack || 'No stack trace');
      };
      
      showDebug('Page loaded at ' + new Date().toISOString());
      showDebug('User agent: ' + navigator.userAgent);
      
      // Update visible loader status
      const statusEl = document.getElementById('loader-status');
      if (statusEl) statusEl.textContent = 'JS executing...';
      
      // Check if React will mount
      setTimeout(function() {
        const root = document.getElementById('root');
        if (root && root.children.length <= 1) {
          if (statusEl) statusEl.textContent = 'React not mounting - check console';
          showDebug('WARNING: React appears not to have mounted after 3s');
        }
      }, 3000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
