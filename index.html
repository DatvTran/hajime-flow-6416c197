<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="hsl(220 20% 12%)" />
    <link rel="icon" type="image/png" href="/hajime-logo.png" />
    <title>Hajime — B2B Operations App</title>
    <meta name="description" content="Hajime B2B Operations App — real-time inventory, sales, accounts, manufacturer POs, shipments, and reporting." />
    <meta property="og:title" content="Hajime — B2B Operations App" />
    <meta property="og:description" content="Real-time B2B operations for Hajime: inventory, orders, CRM, production, and logistics in one system." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <div id="debug-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #0f0; font-family: monospace; font-size: 14px; padding: 20px; z-index: 99999; overflow: auto; display: none;">
      <h2>Debug Console</h2>
      <pre id="debug-log"></pre>
    </div>
    <script>
      // Debug logging
      window.DEBUG_LOG = [];
      const originalLog = console.log;
      const originalError = console.error;
      
      function showDebug(msg) {
        window.DEBUG_LOG.push(msg);
        const overlay = document.getElementById('debug-overlay');
        const log = document.getElementById('debug-log');
        if (overlay && log) {
          overlay.style.display = 'block';
          log.textContent = window.DEBUG_LOG.join('\n');
        }
      }
      
      console.log = function(...args) {
        originalLog.apply(console, args);
        showDebug('[LOG] ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
      };
      
      console.error = function(...args) {
        originalError.apply(console, args);
        showDebug('[ERROR] ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
      };
      
      window.onerror = function(msg, url, line, col, error) {
        showDebug('[FATAL] ' + msg + ' at ' + url + ':' + line + ':' + col);
        showDebug(error?.stack || 'No stack trace');
      };
      
      showDebug('Page loaded at ' + new Date().toISOString());
      showDebug('User agent: ' + navigator.userAgent);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
