<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="hsl(220 20% 12%)" />
    <link rel="icon" type="image/png" href="/hajime-logo.png" />
    <title>Hajime — B2B Operations App</title>
    <meta name="description" content="Hajime B2B Operations App — real-time inventory, sales, accounts, manufacturer POs, shipments, and reporting." />
    <meta property="og:title" content="Hajime — B2B Operations App" />
    <meta property="og:description" content="Real-time B2B operations for Hajime: inventory, orders, CRM, production, and logistics in one system." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <!-- Cache control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  </head>

  <body>
    <!-- Immediate test -->
    <script>
      console.log('[HTML] Body script executing');
      window.HTML_LOADED = true;
    </script>
    
    <!-- Debug overlay - catches React errors -->
    <div id="error-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;color:#0f0;font-family:monospace;padding:20px;z-index:99999;overflow:auto;white-space:pre-wrap;"></div>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        const overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.style.display = 'block';
          overlay.textContent += '[ERROR] ' + msg + '\n at ' + url + ':' + line + ':' + col + '\n' + (err?.stack || '') + '\n\n';
        }
        console.error('[Global Error]', msg, err);
      };
      // Capture unhandled promise rejections
      window.addEventListener('unhandledrejection', function(e) {
        const overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.style.display = 'block';
          overlay.textContent += '[PROMISE REJECTION] ' + e.reason + '\n\n';
        }
        console.error('[Unhandled Rejection]', e.reason);
      });
    </script>
    
    <div id="root">
      <!-- Loading state visible before React mounts -->
      <div id="initial-loader" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, sans-serif; z-index: 99999;">
        <div style="font-size: 28px; margin-bottom: 16px;">⏳</div>
        <div style="font-size: 20px; font-weight: 500;">Hajime Loading...</div>
        <div id="loader-status" style="font-size: 12px; opacity: 0.5; margin-top: 16px; font-family: monospace;">Waiting for JS...</div>
      </div>
    </div>
    
    <!-- Vite will inject the app script here -->
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Monitor loader status
      const statusEl = document.getElementById('loader-status');
      if (statusEl) statusEl.textContent = 'Script tag found';
      
      // Detect React mounting
      setTimeout(function checkMount() {
        const root = document.getElementById('root');
        const loader = document.getElementById('initial-loader');
        
        if (!loader) {
          console.log('[HTML] Loader removed - React mounted');
          return;
        }
        
        if (statusEl) {
          if (window.HTML_LOADED) {
            statusEl.textContent = 'JS running but React not mounting';
          } else {
            statusEl.textContent = 'JS not executing - check console for errors';
          }
        }
      }, 2000);
      
      // Catch any errors
      window.addEventListener('error', function(e) {
        console.error('[HTML] Error:', e.message);
        if (statusEl) {
          statusEl.textContent = 'ERROR: ' + e.message;
          statusEl.style.color = '#ff4444';
        }
      });
    </script>
  </body>
</html>
