<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="hsl(220 20% 12%)" />
    <link rel="icon" type="image/png" href="/hajime-logo.png?v=3" />
    <title>Hajime — B2B Operations App</title>
    <meta name="description" content="Hajime B2B Operations App — real-time inventory, sales, accounts, manufacturer POs, shipments, and reporting." />
    <meta property="og:title" content="Hajime — B2B Operations App" />
    <meta property="og:description" content="Real-time B2B operations for Hajime: inventory, orders, CRM, production, and logistics in one system." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <!-- Cache control for production -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, proxy-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Surrogate-Control" content="no-store" />
    
    <!-- Cache busting timestamp -->
    <meta name="build-time" content="2026-04-12T21:58:00Z" />
  </head>

  <body>
    <div id="root"></div>
    
    <!-- Clear any legacy service workers and caches -->
    <script>
      (function() {
        // Force clear any cached scripts
        if (window.caches) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              caches.delete(name);
            });
          });
        }
        
        // Unregister service workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(registration) {
              registration.unregister();
            });
          });
        }
      })();
    </script>
    
    <script type="module" src="/src/main.tsx?v=3&nocache=2026-04-12"></script>
  </body>
</html>
