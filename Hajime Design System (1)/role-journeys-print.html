<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hajime — Role Journeys</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:hsl(40 18% 97%);font-family:'DM Sans',system-ui,sans-serif}
  *{box-sizing:border-box}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="deck-stage.js"></script>
</head>
<body>
<deck-stage id="deck"></deck-stage>
<script type="text/babel" src="journeys/shared.jsx"></script>
<script type="text/babel" src="journeys/intro.jsx"></script>
<script type="text/babel" src="journeys/role-hq.jsx"></script>
<script type="text/babel" src="journeys/role-hq2.jsx"></script>
<script type="text/babel" src="journeys/role-manuf.jsx"></script>
<script type="text/babel" src="journeys/role-dist.jsx"></script>
<script type="text/babel" src="journeys/role-rep.jsx"></script>
<script type="text/babel" src="journeys/role-retail.jsx"></script>
<script type="text/babel">
function Deck(){
  return (
    <>
      <CoverSlide/>
      <OverviewSlide/>
      <HqContextSlide/>
      <HqTodaySlide/>
      <HqApprovalsSlide/>
      <ManufContextSlide/>
      <ManufBoardSlide/>
      <DistContextSlide/>
      <DistDepletionSlide/>
      <RepContextSlide/>
      <RepMobileSlide/>
      <RetailContextSlide/>
      <RetailScreenSlide/>
      <ClosingSlide/>
    </>
  );
}

const stage = document.getElementById('deck');
ReactDOM.createRoot(stage).render(<Deck/>);
</script>
<script>
(async () => {
  try { await customElements.whenDefined('deck-stage'); } catch (e) {}
  try { await document.fonts.ready; } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 500);
})();
</script>
