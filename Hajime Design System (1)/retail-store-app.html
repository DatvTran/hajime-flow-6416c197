<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Retail Store App" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hajime — The Drake Hotel</title>
<link rel="stylesheet" href="colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-body);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
.shell{display:grid;grid-template-columns:252px 1fr;height:100vh;overflow:hidden}
/* Sidebar */
.side{background:hsl(var(--sidebar-background));color:hsl(var(--sidebar-foreground));display:flex;flex-direction:column;border-right:1px solid hsl(var(--sidebar-border));overflow-y:auto}
.logo-row{display:flex;align-items:center;gap:10px;padding:20px 16px 16px;border-bottom:1px solid hsl(var(--sidebar-border))}
.logo-mark{width:34px;height:34px;border-radius:8px;background:hsl(var(--sidebar-accent));display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.logo-mark img{height:26px;filter:brightness(0) invert(1)}
.logo-name{font-family:var(--font-display);font-weight:600;font-size:16px;color:hsl(35 14% 90%);line-height:1.2}
.logo-sub{font-size:10px;color:hsl(35 12% 42%);margin-top:1px}
.tier-pill{margin:14px 10px 0;background:linear-gradient(135deg,hsl(40 88% 42%/.1),hsl(40 60% 50%/.06));border:1px solid hsl(40 88% 42%/.22);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.tier-dot{width:28px;height:28px;border-radius:999px;background:linear-gradient(135deg,hsl(40 88%42%),hsl(32 78%48%));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tier-t{font-size:11px;font-weight:600;color:hsl(40 80%60%)}
.tier-p{font-size:10px;color:hsl(35 12%42%);margin-top:1px}
.nav-section{padding:14px 10px 6px;display:flex;flex-direction:column;gap:2px}
.nav-label{padding:4px 8px 6px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--sidebar-foreground)/.32)}
.navitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;color:hsl(var(--sidebar-foreground)/.68);font-size:13px;cursor:pointer;transition:background 140ms,color 140ms}
.navitem:hover{background:hsl(var(--sidebar-accent));color:hsl(35 14%90%)}
.navitem.active{background:hsl(var(--sidebar-accent));color:hsl(var(--sidebar-primary));font-weight:500}
.navitem svg{width:15px;height:15px;flex-shrink:0}
.nbadge{margin-left:auto;font-size:10px;font-weight:600;padding:1px 6px;border-radius:999px;font-family:var(--font-mono)}
.nb-gold{background:hsl(40 88%42%/.18);color:hsl(40 88%42%)}
.nb-red{background:hsl(0 68%48%/.14);color:hsl(0 68%42%)}
.side-div{height:1px;background:hsl(var(--sidebar-border));margin:4px 10px 10px}
.side-footer{margin-top:auto;padding:12px 10px;border-top:1px solid hsl(var(--sidebar-border));display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:999px;background:hsl(var(--sidebar-accent));color:hsl(35 14%82%);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.uname{font-size:12px;color:hsl(35 14%88%);font-weight:500}
.urole{font-size:10px;color:hsl(35 12%44%)}
/* Main */
.main{display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
.topbar{height:54px;display:flex;align-items:center;padding:0 32px;gap:14px;background:hsl(var(--glass-bg));backdrop-filter:blur(12px);border-bottom:1px solid hsl(var(--border)/.6);flex-shrink:0;z-index:10}
.crumbs{font-size:13px;color:hsl(var(--muted-foreground))}
.crumbs strong{color:hsl(var(--foreground));font-weight:500}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#pg{overflow-y:auto;flex:1}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;border-radius:8px;padding:0 16px;height:36px;border:1px solid transparent;cursor:pointer;transition:background 140ms,transform 100ms;font-family:var(--font-body)}
.btn:active{transform:scale(.98)}
.btn-accent{background:hsl(var(--accent));color:hsl(var(--accent-foreground))}
.btn-accent:hover{background:hsl(var(--accent-hover))}
.btn-outline{background:hsl(var(--background));border-color:hsl(var(--border));color:hsl(var(--foreground))}
.btn-outline:hover{background:hsl(var(--muted))}
.btn-ink{background:hsl(var(--primary));color:hsl(var(--primary-foreground))}
.btn-ink:hover{background:hsl(24 10%16%)}
.btn-sm{height:30px;font-size:12px;padding:0 12px}
.btn svg{width:14px;height:14px}
/* Page layout */
.pw{padding:30px 40px 80px;max-width:1200px}
.ph{margin-bottom:24px}
.ph h1{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.ph p{font-size:13px;color:hsl(var(--muted-foreground));max-width:54ch}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:var(--font-display);font-size:19px;font-weight:500;letter-spacing:-.01em}
.sec-link{font-size:12px;color:hsl(var(--accent));cursor:pointer;font-weight:500;text-decoration:none}
.sec-link:hover{text-decoration:underline}
.sec-sub{font-size:12px;color:hsl(var(--muted-foreground));margin-top:2px;margin-bottom:16px}
/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.kpi{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow-soft);transition:box-shadow 200ms,transform 200ms}
.kpi:hover{box-shadow:var(--shadow-lifted);transform:translateY(-1px)}
.kpi-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.kpi-ic svg{width:17px;height:17px}
.ic-gold{background:hsl(40 88%42%/.1);color:hsl(40 88%36%)}
.ic-green{background:hsl(158 56%36%/.1);color:hsl(158 56%30%)}
.ic-blue{background:hsl(215 72%50%/.1);color:hsl(215 72%42%)}
.ic-ink{background:hsl(24 10%10%/.07);color:hsl(24 10%18%)}
.kpi-lab{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--muted-foreground));font-weight:500}
.kpi-val{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.1;font-feature-settings:'tnum'}
.kpi-sub{font-size:12px;color:hsl(var(--muted-foreground));margin-top:2px}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;margin-top:2px}
.up{color:hsl(158 56%32%)}
.dn{color:hsl(0 68%44%)}
/* Pills */
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:500;border:1px solid;white-space:nowrap}
.pdot{width:6px;height:6px;border-radius:999px}
.p-green{background:hsl(158 56%36%/.08);color:hsl(158 56%26%);border-color:hsl(158 56%36%/.2)}
.p-blue{background:hsl(215 72%50%/.08);color:hsl(215 72%38%);border-color:hsl(215 72%50%/.2)}
.p-amber{background:hsl(38 90%50%/.1);color:hsl(30 80%30%);border-color:hsl(38 90%50%/.25)}
.p-red{background:hsl(0 68%48%/.08);color:hsl(0 68%38%);border-color:hsl(0 68%48%/.2)}
.p-neutral{background:hsl(var(--muted));color:hsl(var(--muted-foreground));border-color:hsl(var(--border))}
/* Cards */
.card{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-soft)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid hsl(var(--border)/.5)}
.card-head-title{font-size:14px;font-weight:600}
.card-head-sub{font-size:12px;color:hsl(var(--muted-foreground));margin-top:2px}
/* Alert bar */
.alert-bar{display:flex;align-items:flex-start;gap:12px;border-radius:12px;padding:14px 16px;margin-bottom:24px;border:1px solid}
.alert-bar svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.alert-warn{background:hsl(38 90%50%/.07);border-color:hsl(38 90%50%/.22)}
.alert-warn svg{color:hsl(30 80%34%)}
.alert-err{background:hsl(0 68%48%/.06);border-color:hsl(0 68%48%/.2)}
.alert-err svg{color:hsl(0 68%44%)}
/* Filter bar */
.filter-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid hsl(var(--border));background:hsl(var(--background));color:hsl(var(--muted-foreground));cursor:pointer;transition:all 140ms;font-family:var(--font-body)}
.filter-btn.active{background:hsl(var(--primary));color:hsl(var(--primary-foreground));border-color:hsl(var(--primary))}
.filter-btn:hover:not(.active){background:hsl(var(--muted));color:hsl(var(--foreground))}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap input{width:100%;height:36px;padding:0 12px 0 36px;border-radius:8px;border:1px solid hsl(var(--border));background:hsl(var(--background));font-size:13px;font-family:var(--font-body);color:hsl(var(--foreground));outline:none}
.search-wrap input:focus{border-color:hsl(var(--ring))}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:hsl(var(--muted-foreground));pointer-events:none}
/* Catalog grid */
.catalog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.pcard{background:hsl(var(--card));border:1px solid hsl(var(--border)/.6);border-radius:14px;padding:18px;box-shadow:var(--shadow-soft);transition:box-shadow 250ms,transform 250ms;display:flex;flex-direction:column;gap:0}
.pcard:hover{box-shadow:var(--shadow-lifted);transform:translateY(-2px)}
.pcard-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
.bottle-thumb{width:48px;height:80px;flex-shrink:0;border-radius:6px 6px 10px 10px;position:relative}
.bt-dark{background:linear-gradient(160deg,hsl(24 10%14%),hsl(24 12%10%))}
.bt-light{background:linear-gradient(160deg,hsl(37 16%96%),hsl(35 12%90%));border:1px solid hsl(35 12%84%)}
.bt-blue{background:linear-gradient(160deg,hsl(215 60%22%),hsl(215 72%30%))}
.bt-copper{background:linear-gradient(160deg,hsl(32 60%35%),hsl(30 50%28%))}
.bt-cream{background:linear-gradient(160deg,hsl(40 30%88%),hsl(38 20%80%));border:1px solid hsl(38 16%76%)}
.bt-green{background:linear-gradient(160deg,hsl(158 40%22%),hsl(158 50%16%))}
.bottle-cap{position:absolute;top:0;left:50%;transform:translateX(-50%);width:13px;height:11px;background:hsl(35 14%80%);border-radius:2px}
.pcard-sku{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground));text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.pcard-name{font-family:var(--font-display);font-size:17px;font-weight:500;letter-spacing:-.01em;line-height:1.2}
.pcard-type{font-size:12px;color:hsl(var(--muted-foreground));margin-top:2px}
.pcard-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:999px;border:1px solid}
.tag-warn{background:hsl(38 90%50%/.1);color:hsl(30 80%30%);border-color:hsl(38 90%50%/.25)}
.tag-gold{background:hsl(40 88%42%/.1);color:hsl(40 88%30%);border-color:hsl(40 88%42%/.25)}
.tag-green{background:hsl(158 56%36%/.08);color:hsl(158 56%26%);border-color:hsl(158 56%36%/.2)}
.tag-neutral{background:hsl(var(--muted));color:hsl(var(--muted-foreground));border-color:hsl(var(--border))}
.pcard-price-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.pcard-price{font-family:var(--font-display);font-size:20px;font-weight:600;font-feature-settings:'tnum';letter-spacing:-.01em}
.pcard-per{font-size:12px;color:hsl(var(--muted-foreground));font-weight:400;margin-left:2px;font-family:var(--font-body)}
.pcard-stock{font-size:12px;color:hsl(var(--muted-foreground))}
.pcard-stock strong{color:hsl(158 56%28%);font-weight:600}
.dep-bar{height:4px;border-radius:999px;background:hsl(var(--border));overflow:hidden;margin:8px 0}
.dep-fill{height:100%;border-radius:999px}
.dep-low{background:hsl(0 68%48%)}
.dep-med{background:hsl(38 90%50%)}
.dep-ok{background:hsl(158 56%36%)}
.qty-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1px solid hsl(var(--border));background:hsl(var(--background));display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:background 120ms}
.qty-btn:hover{background:hsl(var(--muted))}
.qty-val{font-family:var(--font-mono);font-weight:500;min-width:26px;text-align:center;font-feature-settings:'tnum'}
.qty-case{font-size:11px;color:hsl(var(--muted-foreground));margin-left:auto}
.add-btn{width:100%;height:34px;border-radius:8px;background:hsl(var(--accent));color:hsl(var(--accent-foreground));border:none;font-weight:500;font-size:13px;cursor:pointer;font-family:var(--font-body);display:flex;align-items:center;justify-content:center;gap:6px;transition:background 150ms,transform 100ms}
.add-btn:hover{background:hsl(var(--accent-hover))}
.add-btn:active{transform:scale(.98)}
.add-btn.in-order{background:hsl(158 56%36%/.1);color:hsl(158 56%28%);border:1px solid hsl(158 56%36%/.25)}
/* Order builder */
.order-split{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.sku-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid hsl(var(--border)/.5)}
.sku-thumb{width:40px;height:66px;border-radius:5px 5px 8px 8px;flex-shrink:0;position:relative}
.cart-panel{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:16px;padding:20px;position:sticky;top:20px;box-shadow:var(--shadow-soft)}
.cart-title{font-family:var(--font-display);font-size:17px;font-weight:500;letter-spacing:-.01em;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid hsl(var(--border)/.5)}
.cart-empty{color:hsl(var(--muted-foreground));font-size:13px;text-align:center;padding:20px 0}
.cart-line{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid hsl(var(--border)/.4);font-size:13px}
.cart-line:last-of-type{border-bottom:none}
.cart-total-row{display:flex;justify-content:space-between;padding-top:12px;margin-top:8px;border-top:2px solid hsl(var(--border));font-size:15px;font-weight:700}
.notes-area{width:100%;padding:10px 12px;border-radius:8px;border:1px solid hsl(var(--border));background:hsl(var(--background));font-size:13px;font-family:var(--font-body);resize:none;outline:none;margin-top:12px;color:hsl(var(--foreground))}
.notes-area:focus{border-color:hsl(var(--ring))}
/* Reorder templates */
.template-card{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;padding:20px;box-shadow:var(--shadow-soft);margin-bottom:14px;transition:box-shadow 200ms}
.template-card:hover{box-shadow:var(--shadow-lifted)}
.template-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.template-id{font-family:var(--font-mono);font-size:12px;color:hsl(var(--muted-foreground))}
.template-items{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.template-tag{font-size:12px;padding:4px 10px;border-radius:999px;background:hsl(var(--muted));border:1px solid hsl(var(--border)/.6);color:hsl(var(--foreground))}
.template-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid hsl(var(--border)/.5)}
.template-total{font-family:var(--font-display);font-size:20px;font-weight:600;letter-spacing:-.01em}
/* Deliveries */
.shipment-row{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-soft)}
.ship-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:background 140ms}
.ship-header:hover{background:hsl(var(--muted)/.3)}
.ship-detail{padding:16px 20px;border-top:1px solid hsl(var(--border)/.5);display:none}
.ship-detail.open{display:block}
/* Backbar */
.bb-table{width:100%;border-collapse:collapse}
.bb-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--muted-foreground));font-weight:600;padding:10px 14px;background:hsl(var(--muted)/.5);border-bottom:1px solid hsl(var(--border)/.5)}
.bb-table td{padding:12px 14px;border-bottom:1px solid hsl(var(--border)/.4);font-size:13px;vertical-align:middle}
.bb-table tr:last-child td{border-bottom:none}
.bb-table tr:hover td{background:hsl(var(--muted)/.25)}
.count-input{width:72px;height:32px;padding:0 10px;border-radius:6px;border:1px solid hsl(var(--border));background:hsl(var(--background));font-size:13px;font-family:var(--font-mono);text-align:center;outline:none;color:hsl(var(--foreground))}
.count-input:focus{border-color:hsl(var(--ring))}
/* Tier table */
.tier-table{width:100%;border-collapse:collapse;font-size:13px}
.tier-table th{padding:12px 16px;font-size:12px;font-weight:600;text-align:center;background:hsl(var(--muted)/.5);border:1px solid hsl(var(--border)/.5)}
.tier-table td{padding:11px 16px;border:1px solid hsl(var(--border)/.4);text-align:center;vertical-align:middle}
.tier-table .fcol{text-align:left;font-weight:500;color:hsl(var(--muted-foreground))}
.tier-table .cur{background:hsl(40 88%42%/.06);border-color:hsl(40 88%42%/.2)}
.tier-table .chk{color:hsl(158 56%32%);font-size:15px}
.tier-table .dash{color:hsl(var(--muted-foreground))}
/* FAQ */
.faq-item{border-bottom:1px solid hsl(var(--border)/.5)}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:16px 0;cursor:pointer;font-size:14px;font-weight:500;user-select:none}
.faq-icon{width:20px;height:20px;border-radius:999px;background:hsl(var(--muted));display:flex;align-items:center;justify-content:center;font-size:12px;transition:transform 200ms;flex-shrink:0}
.faq-q.open .faq-icon{transform:rotate(45deg)}
.faq-body{display:none;padding:0 0 16px;font-size:13px;color:hsl(var(--muted-foreground));line-height:1.7}
/* Form */
.form-section{margin-bottom:28px}
.form-section-title{font-size:14px;font-weight:600;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid hsl(var(--border)/.5)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:11px;font-weight:500;color:hsl(var(--muted-foreground));text-transform:uppercase;letter-spacing:.08em}
.form-group input,.form-group select{height:38px;padding:0 12px;border-radius:8px;border:1px solid hsl(var(--border));background:hsl(var(--background));font-size:13px;font-family:var(--font-body);color:hsl(var(--foreground));outline:none}
.form-group input:focus,.form-group select:focus{border-color:hsl(var(--ring))}
.form-group input[readonly]{background:hsl(var(--muted)/.5);color:hsl(var(--muted-foreground))}
/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid hsl(var(--border)/.4)}
.toggle-row:last-child{border-bottom:none}
.toggle-info .ti{font-size:13px;font-weight:500}
.toggle-info .ts{font-size:12px;color:hsl(var(--muted-foreground));margin-top:2px}
.toggle-switch{width:40px;height:22px;border-radius:999px;background:hsl(var(--muted));position:relative;cursor:pointer;transition:background 200ms;flex-shrink:0}
.toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:999px;background:white;box-shadow:0 1px 3px hsl(24 10%10%/.2);transition:transform 200ms}
.toggle-switch.on{background:hsl(var(--accent))}
.toggle-switch.on::after{transform:translateX(18px)}
/* Reports */
.reports-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.rc{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;padding:18px;box-shadow:var(--shadow-soft)}
.rc-lab{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--muted-foreground));font-weight:500;margin-bottom:8px}
.rc-val{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:-.02em}
.rc-sub{font-size:12px;color:hsl(var(--muted-foreground));margin-top:4px}
.rc-delta{font-size:11px;font-weight:500;margin-top:4px}
/* Data table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--muted-foreground));font-weight:600;padding:10px 16px;background:hsl(var(--muted)/.5);border-bottom:1px solid hsl(var(--border)/.5)}
.data-table td{padding:12px 16px;border-bottom:1px solid hsl(var(--border)/.4);font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr{cursor:pointer;transition:background 120ms}
.data-table tbody tr:hover td{background:hsl(var(--muted)/.3)}
/* Shipment tracker */
.tracker-steps{display:flex;align-items:flex-start;gap:0;position:relative;margin-bottom:14px}
.tracker-steps::before{content:'';position:absolute;left:5%;right:5%;top:16px;height:2px;background:hsl(var(--border))}
.tstep{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1}
.tstep-dot{width:32px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid hsl(var(--card));background:hsl(var(--muted));color:hsl(var(--muted-foreground))}
.tstep.done .tstep-dot{background:hsl(158 56%36%);color:white}
.tstep.cur .tstep-dot{background:hsl(var(--accent));color:white;box-shadow:0 0 0 5px hsl(40 88%42%/.16)}
.tstep-label{font-size:11px;color:hsl(var(--muted-foreground));font-weight:500;text-align:center}
.tstep.done .tstep-label,.tstep.cur .tstep-label{color:hsl(var(--foreground))}
.tstep-date{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground))}
/* Incentive card (compact for home) */
.inc-mini{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-soft);margin-bottom:28px;cursor:pointer;transition:box-shadow 200ms}
.inc-mini:hover{box-shadow:var(--shadow-lifted)}
.inc-mini-header{background:linear-gradient(135deg,hsl(24 12%9%),hsl(24 14%13%));padding:20px 24px;display:flex;align-items:center;gap:20px;position:relative;overflow:hidden}
.inc-mini-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70%100% at 100%50%,hsl(40 88%42%/.1),transparent);pointer-events:none}
/* Misc */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:28px}
.info-card{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;padding:20px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid hsl(var(--border)/.3);font-size:13px}
.info-row:last-child{border-bottom:none}
.ir-lab{color:hsl(var(--muted-foreground))}
.contact-card{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px;margin-bottom:24px;box-shadow:var(--shadow-soft)}
.rep-avatar{width:52px;height:52px;border-radius:999px;background:hsl(var(--primary));color:hsl(var(--primary-foreground));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:20px;font-weight:600;flex-shrink:0}
@keyframes enterUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.enter{animation:enterUp 400ms var(--ease-out-expo) both}
</style>
</head>

<script>
const LABELS={home:'Home',catalog:'Catalog','new-order':'New order',reorder:'Reorder',deliveries:'Deliveries',orders:'My orders',backbar:'Backbar tracker',partner:'Partner program',reports:'Sell-through reports',support:'Support',account:'My account'};

function nav(id){
  document.querySelectorAll('[data-nav]').forEach(el=>el.classList.toggle('active',el.dataset.nav===id));
  document.getElementById('page-title').textContent=LABELS[id]||id;
  const pg=document.getElementById('pg');
  pg.innerHTML=(PAGES[id]||PAGES.home)();
  pg.scrollTop=0;
  bind(id);
}

function pill(type,label){
  const map={green:'p-green',blue:'p-blue',amber:'p-amber',red:'p-red',neutral:'p-neutral'};
  const dots={green:'hsl(158 56% 36%)',blue:'hsl(215 72% 50%)',amber:'hsl(38 90% 50%)',red:'hsl(0 68% 48%)',neutral:'hsl(var(--muted-foreground))'};
  return `<span class="pill ${map[type]||'p-neutral'}"><span class="pdot" style="background:${dots[type]||'grey'}"></span>${label}</span>`;
}

function bottle(cls){return `<div class="bottle-thumb ${cls}" style="position:relative"><div class="bottle-cap"></div></div>`;}

function kpi(iconPath,icCls,lab,val,sub,delta,deltaClass){
  return`<div class="kpi"><div class="kpi-ic ${icCls}"><svg fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">${iconPath}</svg></div><div class="kpi-lab">${lab}</div><div class="kpi-val">${val}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}${delta?`<div class="kpi-delta ${deltaClass}">${delta}</div>`:''}</div>`;
}

const IC={
  home:`<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
  cart:`<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>`,
  truck:`<rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>`,
  star:`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
  bar:`<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`,
  check:`<polyline points="20 6 9 17 4 12"/>`,
  lock:`<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>`,

};

function svgIcon(d,s=14){return`<svg fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24" style="width:${s}px;height:${s}px">${d}</svg>`;}

function bind(id){
  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      this.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
    });
  });
  // FAQ accordion
  document.querySelectorAll('.faq-q').forEach(q=>{
    q.addEventListener('click',function(){
      const body=this.nextElementSibling;
      const isOpen=body.style.display==='block';
      this.classList.toggle('open',!isOpen);
      body.style.display=isOpen?'none':'block';
    });
  });
  // Toggle switches
  document.querySelectorAll('.toggle-switch').forEach(t=>{
    t.addEventListener('click',function(){this.classList.toggle('on');});
  });
  // Qty btns
  document.querySelectorAll('[data-dec],[data-inc]').forEach(btn=>{
    btn.addEventListener('click',function(){
      const key=this.dataset.dec||this.dataset.inc;
      const isInc=!!this.dataset.inc;
      const el=document.getElementById('qty-'+key);
      if(!el)return;
      const prices={fp750:48,jn720:32,ry500:82,fp750b:52,ng720:28,hj500:38};
      let v=parseInt(el.textContent);
      v=isInc?v+1:Math.max(0,v-1);
      el.textContent=v;
      const line=document.getElementById('line-'+key);
      if(line)line.textContent=v>0?'$'+(v*(prices[key]||0)).toLocaleString():'—';
      updateCart();
    });
  });
  function updateCart(){
    const prices={fp750:48,jn720:32,ry500:82,fp750b:52,ng720:28,hj500:38};
    let total=0;const lines=[];
    Object.entries(prices).forEach(([k,p])=>{
      const el=document.getElementById('qty-'+k);
      if(!el)return;
      const v=parseInt(el.textContent);
      if(v>0){total+=v*p;lines.push({n:SKUS.find(s=>s.id===k)?.name||k,v,p});}
    });
    const cl=document.getElementById('cart-lines');
    const ct=document.getElementById('cart-total');
    const sb=document.getElementById('submit-order');
    if(cl)cl.innerHTML=lines.length?lines.map(l=>`<div class="cart-line"><span>${l.n} × ${l.v}</span><span style="font-family:var(--font-mono)">$${(l.v*l.p).toLocaleString()}</span></div>`).join(''):'<div class="cart-empty">No items added yet</div>';
    if(ct)ct.textContent='$'+total.toLocaleString()+'.00';
    if(sb)sb.disabled=total===0;
  }
}
