<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Global markets dashboard" subtitle="Three variations on canvas — classic KPIs, cartographic, ops-timeline" -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hajime — Global markets (exploration)</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html,body{margin:0;padding:0;overflow:hidden}
  .hajime-brand-font{font-family:var(--font-display)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="markets/shared.jsx"></script>
<script type="text/babel" src="markets/v1-classic.jsx"></script>
<script type="text/babel" src="markets/v2-cartographic.jsx"></script>
<script type="text/babel" src="markets/v3-timeline.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <div style={{ padding: '40px 60px 24px' }}>
        <div style={{
          fontFamily: 'var(--font-display)', fontSize: 36, fontWeight: 600,
          letterSpacing: '-0.02em', color: '#1C1916'
        }}>Global markets — dashboard explorations</div>
        <div style={{ fontSize: 14, color: 'rgba(60,50,40,0.6)', marginTop: 6, maxWidth: 640 }}>
          Three takes on the HQ-level global-markets surface. Shared tokens — warm stone paper, sumi ink, single barrel-gold accent, three-family type system. Each explores a different lens on the same dataset: sell-through, stock cover, and in-flight logistics across 12 markets.
        </div>
      </div>

      <DCSection title="Option 1 — Classic KPI board" subtitle="Familiar. Works well for a heads-down ops view. Emphasis on tabular data and flags.">
        <DCArtboard label="1440 × 920" width={1440} height={920}>
          <V1Classic />
        </DCArtboard>
        <DCPostIt top={60} left={1460} rotate={3} width={220}>
          Most directly adapted from Operator HQ. Lowest cognitive lift. Feels a little dense / undifferentiated.
        </DCPostIt>
      </DCSection>

      <DCSection title="Option 2 — Cartographic" subtitle="World map as primary lens. Each market glyph tells its own story at a glance.">
        <DCArtboard label="1440 × 920" width={1440} height={920}>
          <V2Cartographic />
        </DCArtboard>
        <DCPostIt top={60} left={1460} rotate={-2} width={220}>
          More expressive. Map is stylized (dot-matrix, not photoreal) so it stays on-brand.
        </DCPostIt>
      </DCSection>

      <DCSection title="Option 3 — Ops timeline" subtitle="Horizontal time spine. Foregrounds the motion of shipments and the rhythm of markets.">
        <DCArtboard label="1440 × 920" width={1440} height={920}>
          <V3Timeline />
        </DCArtboard>
        <DCPostIt top={60} left={1460} rotate={2} width={220}>
          Most novel. Reads like a control-room tape. Good for people who live in logistics view.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
