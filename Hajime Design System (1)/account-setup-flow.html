<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hajime — Account Setup Flow</title>
<link rel="stylesheet" href="colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-body);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ─── Tokens ─── */
const C = {
  bg: 'hsl(40 18% 97%)',
  card: 'hsl(40 20% 99%)',
  border: 'hsl(35 12% 89%)',
  muted: 'hsl(24 6% 50%)',
  accent: 'hsl(40 88% 42%)',
  accentHov: 'hsl(32 78% 48%)',
  ink: 'hsl(24 10% 10%)',
  inkFg: 'hsl(40 20% 97%)',
  sidebar: 'hsl(24 12% 8%)',
  sidebarFg: 'hsl(35 12% 78%)',
  sidebarAccent: 'hsl(24 10% 13%)',
  sidebarBorder: 'hsl(24 10% 15%)',
  success: 'hsl(158 56% 36%)',
  warning: 'hsl(38 90% 50%)',
  info: 'hsl(215 72% 50%)',
  softShadow: '0 1px 2px hsl(24 10% 10% / .04), 0 4px 12px hsl(24 10% 10% / .03)',
  liftedShadow: '0 2px 4px hsl(24 10% 10% / .06), 0 8px 24px hsl(24 10% 10% / .06)',
};

/* ─── Shared UI primitives ─── */
const Btn = ({ children, variant='ink', size='md', onClick, style={}, disabled=false }) => {
  const base = {
    display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6,
    fontFamily:'var(--font-body)', fontWeight:500, borderRadius:8, border:'1px solid transparent',
    cursor: disabled ? 'not-allowed' : 'pointer', transition:'background 140ms, transform 100ms',
    opacity: disabled ? 0.5 : 1,
    ...(size==='md' ? {fontSize:13, padding:'0 16px', height:36} : {fontSize:12, padding:'0 12px', height:30}),
    ...( variant==='accent' ? {background:C.accent, color:C.inkFg} :
         variant==='outline' ? {background:C.card, borderColor:C.border, color:C.ink} :
         variant==='ghost' ? {background:'transparent', color:C.muted, borderColor:'transparent'} :
         {background:C.ink, color:C.inkFg} ),
    ...style
  };
  return <button style={base} onClick={disabled ? undefined : onClick}>{children}</button>;
};

const Field = ({ label, hint, children, required }) => (
  <div style={{display:'flex', flexDirection:'column', gap:5}}>
    <label style={{fontSize:12, fontWeight:500, color:C.ink, display:'flex', gap:4, alignItems:'center'}}>
      {label}
      {required && <span style={{color:C.accent, fontSize:10}}>*</span>}
      {hint && <span style={{fontWeight:400, color:C.muted, fontSize:11}}>— {hint}</span>}
    </label>
    {children}
  </div>
);

const Input = ({ placeholder='', value, onChange, type='text', readOnly=false, mono=false, style={} }) => (
  <input
    type={type}
    placeholder={placeholder}
    value={value}
    onChange={onChange}
    readOnly={readOnly}
    style={{
      height:36, borderRadius:8, border:`1px solid ${C.border}`,
      background: readOnly ? 'hsl(37 14% 94%)' : C.card,
      padding:'0 12px', fontSize:13, color:C.ink, width:'100%', outline:'none',
      fontFamily: mono ? 'var(--font-mono)' : 'var(--font-body)',
      ...style
    }}
  />
);

const Select = ({ value, onChange, options }) => (
  <select value={value} onChange={onChange} style={{
    height:36, borderRadius:8, border:`1px solid ${C.border}`,
    background:C.card, padding:'0 12px', fontSize:13, color:C.ink,
    width:'100%', outline:'none', cursor:'pointer', fontFamily:'var(--font-body)'
  }}>
    {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
  </select>
);

const Textarea = ({ placeholder, value, onChange, rows=3 }) => (
  <textarea
    placeholder={placeholder}
    value={value}
    onChange={onChange}
    rows={rows}
    style={{
      borderRadius:8, border:`1px solid ${C.border}`, background:C.card,
      padding:'10px 12px', fontSize:13, color:C.ink, width:'100%',
      outline:'none', resize:'vertical', fontFamily:'var(--font-body)', lineHeight:1.6
    }}
  />
);

const Checkbox = ({ checked, onChange, label }) => (
  <label style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:13, color:C.ink}}>
    <div onClick={() => onChange(!checked)} style={{
      width:18, height:18, borderRadius:4, border:`1.5px solid ${checked ? C.accent : C.border}`,
      background: checked ? C.accent : C.card,
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, cursor:'pointer',
      transition:'all 140ms'
    }}>
      {checked && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    </div>
    {label}
  </label>
);

const RadioGroup = ({ options, value, onChange }) => (
  <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
    {options.map(opt => (
      <label key={opt} style={{
        display:'flex', alignItems:'center', gap:7, cursor:'pointer',
        padding:'6px 14px', borderRadius:8, fontSize:13,
        border:`1px solid ${value===opt ? C.accent : C.border}`,
        background: value===opt ? 'hsl(40 88% 42% / .07)' : C.card,
        color: value===opt ? 'hsl(40 88% 32%)' : C.ink,
        transition:'all 140ms', fontWeight: value===opt ? 500 : 400
      }}>
        <input type="radio" name="radio" value={opt} checked={value===opt} onChange={()=>onChange(opt)} style={{display:'none'}} />
        {value===opt && <span style={{fontSize:9, color:C.accent}}>●</span>}
        {opt}
      </label>
    ))}
  </div>
);

const Pill = ({ label, variant='green' }) => {
  const map = {
    green: {bg:'hsl(158 56% 36% / .1)',color:'hsl(158 56% 26%)',border:'hsl(158 56% 36% / .22)'},
    amber: {bg:'hsl(38 90% 50% / .1)',color:'hsl(30 80% 28%)',border:'hsl(38 90% 50% / .28)'},
    blue: {bg:'hsl(215 72% 50% / .1)',color:'hsl(215 72% 36%)',border:'hsl(215 72% 50% / .22)'},
    stone: {bg:'hsl(37 14% 94%)',color:C.muted,border:C.border},
  };
  const s = map[variant] || map.stone;
  return <span style={{
    display:'inline-flex', alignItems:'center', gap:5,
    borderRadius:9999, padding:'2px 9px', fontSize:11, fontWeight:500,
    background:s.bg, color:s.color, border:`1px solid ${s.border}`
  }}>{label}</span>;
};

const SectionCard = ({ title, children, style={} }) => (
  <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:'22px 24px', boxShadow:C.softShadow, ...style}}>
    {title && <div style={{fontFamily:'var(--font-display)', fontSize:16, fontWeight:500, letterSpacing:'-.01em', marginBottom:18, paddingBottom:14, borderBottom:`1px solid ${C.border}`}}>{title}</div>}
    {children}
  </div>
);

/* ─── Sidebar (Sales Rep / Distributor) ─── */
const Sidebar = ({ active }) => {
  const navItems = [
    { icon: <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>, label: 'Dashboard' },
    { icon: <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>, label: 'Accounts', active: true },
    { icon: <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>, label: 'Orders' },
    { icon: <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>, label: 'Deliveries' },
    { icon: <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>, label: 'Reports' },
  ];
  return (
    <aside style={{
      width:252, background:C.sidebar, color:C.sidebarFg,
      display:'flex', flexDirection:'column', borderRight:`1px solid ${C.sidebarBorder}`,
      flexShrink:0
    }}>
      <div style={{display:'flex', alignItems:'center', gap:10, padding:'20px 16px 16px', borderBottom:`1px solid ${C.sidebarBorder}`}}>
        <div style={{width:34, height:34, borderRadius:8, background:C.sidebarAccent, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', flexShrink:0}}>
          <img src="assets/hajime-logo.png" alt="Hajime" style={{height:26, filter:'brightness(0) invert(1)'}} />
        </div>
        <div>
          <div style={{fontFamily:'var(--font-display)', fontWeight:600, fontSize:16, color:'hsl(35 14% 90%)', lineHeight:1.2}}>Hajime</div>
          <div style={{fontSize:10, color:'hsl(35 12% 42%)', marginTop:1}}>Sales Operations</div>
        </div>
      </div>

      <div style={{padding:'14px 10px 6px', display:'flex', flexDirection:'column', gap:2}}>
        <div style={{padding:'4px 8px 6px', fontSize:10, fontWeight:500, textTransform:'uppercase', letterSpacing:'.14em', color:'hsl(35 12% 38%)'}}>Field</div>
        {navItems.map(item => (
          <div key={item.label} style={{
            display:'flex', alignItems:'center', gap:9, padding:'8px 10px', borderRadius:6,
            fontSize:13, cursor:'pointer',
            background: item.active ? C.sidebarAccent : 'transparent',
            color: item.active ? 'hsl(40 88% 60%)' : 'hsl(35 12% 62%)',
            fontWeight: item.active ? 500 : 400,
          }}>
            {item.icon}{item.label}
          </div>
        ))}
      </div>

      <div style={{marginTop:'auto', padding:'12px 10px', borderTop:`1px solid ${C.sidebarBorder}`, display:'flex', alignItems:'center', gap:10}}>
        <div style={{width:30, height:30, borderRadius:999, background:C.sidebarAccent, color:'hsl(35 14% 82%)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:600, flexShrink:0}}>MR</div>
        <div>
          <div style={{fontSize:12, color:'hsl(35 14% 88%)', fontWeight:500}}>Marco Rossi</div>
          <div style={{fontSize:10, color:'hsl(35 12% 44%)'}}>Sales Representative</div>
        </div>
      </div>
    </aside>
  );
};

/* ─── Step indicator (onboarding form) ─── */
const StepBar = ({ steps, current }) => (
  <div style={{display:'flex', alignItems:'center', gap:0, marginBottom:32}}>
    {steps.map((s, i) => (
      <React.Fragment key={s}>
        <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:6, flex:1, position:'relative', zIndex:1}}>
          <div style={{
            width:28, height:28, borderRadius:999, display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:11, fontWeight:600, transition:'all 200ms',
            background: i < current ? C.success : i === current ? C.accent : C.card,
            color: i <= current ? '#fff' : C.muted,
            border: `2px solid ${i < current ? C.success : i === current ? C.accent : C.border}`,
            boxShadow: i === current ? `0 0 0 4px hsl(40 88% 42% / .15)` : 'none'
          }}>
            {i < current ? <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5l3 3 6-7" stroke="white" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"/></svg> : i+1}
          </div>
          <div style={{fontSize:11, fontWeight: i===current ? 500 : 400, color: i===current ? C.ink : C.muted, textAlign:'center', whiteSpace:'nowrap'}}>{s}</div>
        </div>
        {i < steps.length-1 && (
          <div style={{height:2, flex:1, marginBottom:22, background: i < current ? C.success : C.border, transition:'background 300ms'}} />
        )}
      </React.Fragment>
    ))}
  </div>
);

/* ─── SCREEN 1: Sales Rep — Send Invite ─── */
const SendInviteScreen = ({ onSent }) => {
  const [form, setForm] = useState({ name:'', email:'', store:'', message:'Hi,\n\nI\'ve set you up with a Hajime account. Please complete your application using the link below to activate ordering with Tre Amici Imports & Vertical Wine Group.\n\nThis takes about 5 minutes. Your rep will review and approve within one business day.\n\nWelcome aboard.' });
  const set = k => e => setForm(f => ({...f, [k]:e.target.value}));
  const ready = form.name && form.email && form.store;

  return (
    <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>
      <Sidebar />
      <div style={{flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden'}}>
        {/* Topbar */}
        <header style={{height:54, display:'flex', alignItems:'center', padding:'0 32px', gap:14, background:'hsl(40 20% 99% / .8)', backdropFilter:'blur(12px)', borderBottom:`1px solid hsl(35 12% 89% / .6)`, flexShrink:0}}>
          <span style={{fontSize:13, color:C.muted}}>Accounts › <strong style={{color:C.ink, fontWeight:500}}>New account</strong></span>
          <div style={{marginLeft:'auto', display:'flex', gap:10}}>
            <Btn variant="outline" onClick={() => {}}>Discard</Btn>
            <Btn variant="accent" disabled={!ready} onClick={onSent}>
              <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.75" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Send invitation
            </Btn>
          </div>
        </header>

        <div style={{flex:1, overflowY:'auto', padding:'32px 48px 80px'}}>
          <div style={{maxWidth:820, margin:'0 auto'}}>
            <div style={{marginBottom:28}}>
              <div style={{fontSize:11, textTransform:'uppercase', letterSpacing:'.1em', color:C.muted, fontWeight:500, marginBottom:6}}>New account</div>
              <h1 style={{fontFamily:'var(--font-display)', fontSize:28, fontWeight:600, letterSpacing:'-.02em', marginBottom:6}}>Send store invitation</h1>
              <p style={{fontSize:13, color:C.muted, maxWidth:'52ch'}}>An email will be sent to the store contact with a secure link to complete the New Licensee Application. You'll be notified when they submit.</p>
            </div>

            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:24}}>
              {/* Left: form */}
              <div style={{display:'flex', flexDirection:'column', gap:20}}>
                <SectionCard title="Store contact">
                  <div style={{display:'flex', flexDirection:'column', gap:14}}>
                    <Field label="Store / business name" required>
                      <Input placeholder="e.g. The Drake Hotel" value={form.store} onChange={set('store')} />
                    </Field>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
                      <Field label="Contact name" required>
                        <Input placeholder="Full name" value={form.name} onChange={set('name')} />
                      </Field>
                      <Field label="Contact title">
                        <Input placeholder="e.g. Beverage Director" value={form.title} onChange={set('title')} />
                      </Field>
                    </div>
                    <Field label="Email address" required>
                      <Input type="email" placeholder="contact@store.com" value={form.email} onChange={set('email')} />
                    </Field>
                    <Field label="Phone (optional)">
                      <Input placeholder="416-555-0100" value={form.phone} onChange={set('phone')} />
                    </Field>
                  </div>
                </SectionCard>

                <SectionCard title="Invitation message">
                  <div style={{display:'flex', flexDirection:'column', gap:14}}>
                    <Field label="Personal note" hint="appended to the standard email">
                      <Textarea rows={5} value={form.message} onChange={set('message')} />
                    </Field>
                    <div style={{display:'flex', alignItems:'center', gap:8, padding:'10px 14px', borderRadius:8, background:'hsl(40 88% 42% / .06)', border:`1px solid hsl(40 88% 42% / .2)`}}>
                      <svg width="14" height="14" fill="none" stroke="hsl(40 88% 36%)" strokeWidth="1.75" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                      <span style={{fontSize:12, color:'hsl(40 88% 32%)'}}>Link expires in <strong>7 days</strong>. One click activates the form.</span>
                    </div>
                  </div>
                </SectionCard>
              </div>

              {/* Right: email preview */}
              <div style={{display:'flex', flexDirection:'column', gap:12}}>
                <div style={{fontSize:11, textTransform:'uppercase', letterSpacing:'.1em', color:C.muted, fontWeight:500}}>Email preview</div>
                <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:14, overflow:'hidden', boxShadow:C.softShadow}}>
                  {/* Email chrome */}
                  <div style={{background:'hsl(37 14% 94%)', borderBottom:`1px solid ${C.border}`, padding:'10px 16px', display:'flex', flexDirection:'column', gap:4}}>
                    <div style={{fontSize:11, color:C.muted}}>To: <span style={{color:C.ink}}>{form.email || 'contact@store.com'}</span></div>
                    <div style={{fontSize:11, color:C.muted}}>From: <span style={{color:C.ink}}>noreply@hajimeops.com</span></div>
                    <div style={{fontSize:11, color:C.muted}}>Subject: <span style={{color:C.ink, fontWeight:500}}>Complete your Tre Amici Imports account setup</span></div>
                  </div>
                  {/* Email body */}
                  <div style={{padding:'24px 24px 28px'}}>
                    <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:20, paddingBottom:16, borderBottom:`1px solid ${C.border}`}}>
                      <img src="assets/hajime-logo.png" alt="Hajime" style={{height:22}} />
                      <span style={{fontFamily:'var(--font-display)', fontWeight:600, fontSize:15, color:C.ink}}>Hajime</span>
                    </div>
                    <p style={{fontSize:13, color:C.muted, marginBottom:4}}>Hi{form.name ? ` ${form.name.split(' ')[0]}` : ''},</p>
                    <p style={{fontSize:13, color:C.ink, marginBottom:16, lineHeight:1.7}}>{form.message || '—'}</p>
                    <div style={{background:'hsl(40 18% 97%)', border:`1px solid ${C.border}`, borderRadius:10, padding:'16px 18px', marginBottom:20}}>
                      <div style={{fontSize:11, textTransform:'uppercase', letterSpacing:'.1em', color:C.muted, fontWeight:500, marginBottom:8}}>Your application</div>
                      <div style={{fontFamily:'var(--font-display)', fontSize:17, fontWeight:500, marginBottom:2}}>{form.store || 'Your store'}</div>
                      <div style={{fontSize:12, color:C.muted, marginBottom:14}}>Tre Amici Imports & Vertical Wine Group · New Licensee Application</div>
                      <div style={{display:'inline-flex', alignItems:'center', gap:6, background:C.accent, color:C.inkFg, borderRadius:8, padding:'8px 18px', fontSize:13, fontWeight:500, cursor:'pointer'}}>
                        Complete application →
                      </div>
                    </div>
                    <p style={{fontSize:11, color:C.muted, lineHeight:1.7}}>Questions? Reply to this email or contact your Hajime representative, Marco Rossi.</p>
                  </div>
                </div>

                {/* Summary */}
                <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'16px 18px', boxShadow:C.softShadow}}>
                  <div style={{fontSize:11, textTransform:'uppercase', letterSpacing:'.1em', color:C.muted, fontWeight:500, marginBottom:12}}>What happens next</div>
                  {[
                    ['Store receives email','Instant'],
                    ['They complete 5-step form','~5 min'],
                    ['You review & approve','1 business day'],
                    ['Account activated','Ordering enabled'],
                  ].map(([a,b],i) => (
                    <div key={i} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 0', borderBottom: i < 3 ? `1px solid ${C.border}` : 'none'}}>
                      <span style={{fontSize:12, color:C.ink}}>{a}</span>
                      <span style={{fontSize:11, color:C.muted, fontFamily:'var(--font-mono)'}}>{b}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ─── SCREEN 2: Confirmation sent ─── */
const InviteSentScreen = ({ onContinue }) => (
  <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>
    <Sidebar />
    <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:0}}>
      <div style={{maxWidth:520, textAlign:'center', padding:40}}>
        <div style={{width:56, height:56, borderRadius:999, background:'hsl(158 56% 36% / .1)', border:`1px solid hsl(158 56% 36% / .22)`, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px'}}>
          <svg width="22" height="22" fill="none" stroke={C.success} strokeWidth="1.75" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2 style={{fontFamily:'var(--font-display)', fontSize:26, fontWeight:600, letterSpacing:'-.02em', marginBottom:10}}>Invitation sent</h2>
        <p style={{fontSize:13, color:C.muted, lineHeight:1.7, marginBottom:28}}>An email has been sent to <strong style={{color:C.ink}}>contact@thedrakehotel.com</strong> with a secure link to complete the New Licensee Application. You'll receive a notification when they submit.</p>
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'16px 20px', marginBottom:28, textAlign:'left', boxShadow:C.softShadow}}>
          <div style={{display:'grid', gridTemplateColumns:'auto 1fr', gap:'8px 16px', alignItems:'center'}}>
            {[
              ['Store','The Drake Hotel'],
