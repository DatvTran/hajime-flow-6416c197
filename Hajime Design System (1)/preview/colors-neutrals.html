<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:hsl(var(--background))}
  .row{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap}
  .sw{flex:1;min-width:110px;border-radius:10px;border:1px solid hsl(var(--border));overflow:hidden;background:hsl(var(--card));display:flex;flex-direction:column}
  .chip{height:60px}
  .meta{padding:8px 10px;font-family:var(--font-body);font-size:11px}
  .meta .name{color:hsl(var(--foreground));font-weight:500}
  .meta .val{color:hsl(var(--muted-foreground));font-family:var(--font-mono);font-size:10px;margin-top:2px}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:hsl(40 18% 97%)"></div><div class="meta"><div class="name">Paper</div><div class="val">40 18% 97%</div></div></div>
  <div class="sw"><div class="chip" style="background:hsl(37 14% 94%)"></div><div class="meta"><div class="name">Muted</div><div class="val">37 14% 94%</div></div></div>
  <div class="sw"><div class="chip" style="background:hsl(35 12% 89%)"></div><div class="meta"><div class="name">Border</div><div class="val">35 12% 89%</div></div></div>
  <div class="sw"><div class="chip" style="background:hsl(24 6% 50%)"></div><div class="meta"><div class="name">Muted fg</div><div class="val">24 6% 50%</div></div></div>
  <div class="sw"><div class="chip" style="background:hsl(24 10% 10%)"></div><div class="meta"><div class="name">Sumi ink</div><div class="val">24 10% 10%</div></div></div>
  <div class="sw"><div class="chip" style="background:hsl(24 12% 8%)"></div><div class="meta"><div class="name">Deep sumi</div><div class="val">24 12% 8%</div></div></div>
</div></body></html>
