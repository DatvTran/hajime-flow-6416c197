<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Elevation" subtitle="soft / lifted / float" viewport="780x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:hsl(var(--background))}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px}
.box{width:100%;height:80px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:12px}
.lab{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground));text-align:center}
.name{font-size:11px;font-weight:500;color:hsl(var(--foreground))}
.soft{box-shadow:0 1px 2px hsl(24 10% 10% / 0.04), 0 4px 12px hsl(24 10% 10% / 0.03)}
.lifted{box-shadow:0 2px 4px hsl(24 10% 10% / 0.06), 0 8px 24px hsl(24 10% 10% / 0.06)}
.float{box-shadow:0 4px 8px hsl(24 10% 10% / 0.06), 0 16px 40px hsl(24 10% 10% / 0.1)}
</style></head><body>
<div class="row">
  <div class="cell"><div class="box soft"></div><div class="name">soft</div><div class="lab">idle cards · KPI tiles</div></div>
  <div class="cell"><div class="box lifted"></div><div class="name">lifted</div><div class="lab">hover · popovers</div></div>
  <div class="cell"><div class="box float"></div><div class="name">float</div><div class="lab">dialogs · toasts</div></div>
</div></body></html>
