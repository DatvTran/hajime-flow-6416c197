<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:hsl(var(--background))}
.wrap{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;align-items:start}
.spec{display:flex;flex-direction:column;gap:6px}
.lab{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--muted-foreground));font-weight:500}
.mono{font-family:var(--font-mono);font-size:13px;color:hsl(var(--foreground))}
.num{font-family:var(--font-display);font-weight:600;font-size:36px;letter-spacing:-.02em;font-feature-settings:'tnum';color:hsl(var(--foreground))}
.meta{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground))}
</style></head><body>
<div class="wrap">
  <div class="spec"><span class="lab">SKU · mono</span><div class="mono">HJM-FP-750</div><div class="mono" style="color:hsl(var(--muted-foreground))">PO-2026-0418</div><span class="meta">JetBrains Mono · 500</span></div>
  <div class="spec"><span class="lab">Stat value</span><div class="num">12,480</div><span class="meta">Display serif · tabular-nums</span></div>
  <div class="spec"><span class="lab">Tabular</span><div class="mono" style="font-feature-settings:'tnum'">+12.4%  · $48.00<br>216 cases · ETA 14 Apr</div><span class="meta">JetBrains Mono · tnum</span></div>
</div></body></html>
