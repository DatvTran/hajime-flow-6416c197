<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Status badges" subtitle="Dot + pill for order / shipment lifecycle" viewport="900x100" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:hsl(var(--background))}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:500;text-transform:capitalize;border:1px solid}
.dot{width:6px;height:6px;border-radius:999px;flex-shrink:0}
.avail{background:hsl(158 56% 36% / .08);color:hsl(158 56% 28%);border-color:hsl(158 56% 36% / .2)}
.reserved{background:hsl(38 90% 50% / .12);color:hsl(30 80% 30%);border-color:hsl(38 90% 50% / .3)}
.transit{background:hsl(215 72% 50% / .08);color:hsl(215 72% 38%);border-color:hsl(215 72% 50% / .2)}
.shipped{background:hsl(215 72% 50% / .08);color:hsl(215 72% 38%);border-color:hsl(215 72% 50% / .2)}
.delivered{background:hsl(158 56% 36% / .08);color:hsl(158 56% 28%);border-color:hsl(158 56% 36% / .2)}
.overdue{background:hsl(0 68% 48% / .08);color:hsl(0 68% 38%);border-color:hsl(0 68% 48% / .2)}
.draft{background:hsl(30 10% 55% / .12);color:hsl(30 10% 35%);border-color:hsl(30 10% 55% / .25)}
.pending{background:hsl(38 90% 50% / .12);color:hsl(30 80% 30%);border-color:hsl(38 90% 50% / .3)}
</style></head><body>
<div class="row">
  <span class="pill avail"><span class="dot" style="background:hsl(158 56% 36%)"></span>available</span>
  <span class="pill reserved"><span class="dot" style="background:hsl(38 90% 50%)"></span>reserved</span>
  <span class="pill transit"><span class="dot" style="background:hsl(215 72% 50%)"></span>in-transit</span>
  <span class="pill shipped"><span class="dot" style="background:hsl(215 72% 50%)"></span>shipped</span>
  <span class="pill delivered"><span class="dot" style="background:hsl(158 56% 36%)"></span>delivered</span>
  <span class="pill overdue"><span class="dot" style="background:hsl(0 68% 48%)"></span>overdue</span>
  <span class="pill draft"><span class="dot" style="background:hsl(30 10% 55%)"></span>draft</span>
  <span class="pill pending"><span class="dot" style="background:hsl(38 90% 50%)"></span>pending</span>
</div></body></html>
