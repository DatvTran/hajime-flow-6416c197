<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Spacing scale" subtitle="4 / 8 / 12 / 16 / 20 / 24 / 32 / 40 / 48" viewport="780x130" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:hsl(var(--background))}
.row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{background:hsl(var(--accent) / .15);border:1px dashed hsl(var(--accent) / .5);border-radius:4px}
.lab{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground))}
.name{font-size:11px;font-weight:500;color:hsl(var(--foreground))}
</style></head><body>
<div class="row">
  <div class="cell"><div class="box" style="width:4px;height:4px"></div><div class="name">1</div><div class="lab">4px</div></div>
  <div class="cell"><div class="box" style="width:8px;height:8px"></div><div class="name">2</div><div class="lab">8px</div></div>
  <div class="cell"><div class="box" style="width:12px;height:12px"></div><div class="name">3</div><div class="lab">12px</div></div>
  <div class="cell"><div class="box" style="width:16px;height:16px"></div><div class="name">4</div><div class="lab">16px</div></div>
  <div class="cell"><div class="box" style="width:20px;height:20px"></div><div class="name">5</div><div class="lab">20px</div></div>
  <div class="cell"><div class="box" style="width:24px;height:24px"></div><div class="name">6</div><div class="lab">24px</div></div>
  <div class="cell"><div class="box" style="width:32px;height:32px"></div><div class="name">8</div><div class="lab">32px</div></div>
  <div class="cell"><div class="box" style="width:40px;height:40px"></div><div class="name">10</div><div class="lab">40px</div></div>
  <div class="cell"><div class="box" style="width:48px;height:48px"></div><div class="name">12</div><div class="lab">48px</div></div>
</div></body></html>
