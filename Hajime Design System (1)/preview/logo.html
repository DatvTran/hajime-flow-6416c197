<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo" subtitle="Hajime wordmark · light & dark" viewport="700x200" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:hsl(40 18% 97%);display:flex;align-items:center;justify-content:center;min-height:80px}
img{height:90px;width:auto;object-fit:contain}
.row{display:flex;gap:48px;align-items:center}
.dark-bg{background:hsl(24 12% 8%);border-radius:12px;padding:16px 40px}
.dark-bg img{filter:brightness(0) invert(1)}
.spec{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground));margin-top:6px;text-align:center}
.wrap{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="row">
  <div class="wrap"><img src="../assets/hajime-logo.png" alt="Hajime"><div class="spec">light · on paper</div></div>
  <div class="wrap"><div class="dark-bg"><img src="../assets/hajime-logo.png" alt="Hajime"></div><div class="spec">dark · invert on sumi</div></div>
</div></body></html>
