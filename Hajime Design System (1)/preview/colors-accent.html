<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Barrel gold" subtitle="Signature accent + gradient" viewport="780x140" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:hsl(var(--background))}
  .wrap{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px}
  .hero{background:linear-gradient(135deg, hsl(40 88% 42%), hsl(32 78% 48%));border-radius:14px;padding:20px;color:hsl(40 20% 97%);min-height:100px;display:flex;flex-direction:column;justify-content:space-between}
  .hero .lab{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.85}
  .hero .name{font-family:var(--font-display);font-size:28px;font-weight:500;letter-spacing:-.02em}
  .hero .val{font-family:var(--font-mono);font-size:11px;opacity:.85}
  .sw{border-radius:10px;border:1px solid hsl(var(--border));background:hsl(var(--card));overflow:hidden;display:flex;flex-direction:column}
  .chip{height:60px}
  .meta{padding:8px 10px;font-size:11px}
  .meta .name{font-weight:500}
  .meta .val{color:hsl(var(--muted-foreground));font-family:var(--font-mono);font-size:10px;margin-top:2px}
</style></head><body>
<div class="wrap">
  <div class="hero">
    <div class="lab">Signature accent</div>
    <div>
      <div class="name">Barrel gold</div>
      <div class="val">hsl(40 88% 42%) · #C98A0C</div>
    </div>
  </div>
  <div class="sw"><div class="chip" style="background:hsl(40 88% 42%)"></div><div class="meta"><div class="name">Accent</div><div class="val">40 88% 42%</div></div></div>
  <div class="sw"><div class="chip" style="background:hsl(32 78% 48%)"></div><div class="meta"><div class="name">Accent hover</div><div class="val">32 78% 48%</div></div></div>
</div></body></html>
