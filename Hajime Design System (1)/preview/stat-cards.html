<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Stat cards" subtitle="KPI tiles · default / accent / warning" viewport="900x180" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:hsl(var(--background))}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.card{background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:16px;padding:20px;box-shadow:0 1px 2px hsl(24 10% 10% / 0.04), 0 4px 12px hsl(24 10% 10% / 0.03)}
.card.accent{background:linear-gradient(135deg, hsl(40 55% 94%), hsl(40 50% 90% / .5));border-color:hsl(40 60% 80% / .5)}
.card.warning{background:linear-gradient(135deg, hsl(30 70% 94%), hsl(30 60% 90% / .5));border-color:hsl(30 70% 80% / .5)}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.lab{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--muted-foreground))}
.val{font-family:var(--font-display);font-size:24px;font-weight:600;letter-spacing:-.02em;margin-top:8px;font-feature-settings:'tnum'}
.sub{font-size:12px;color:hsl(var(--muted-foreground));margin-top:4px}
.icon{width:40px;height:40px;border-radius:12px;background:hsl(var(--muted));display:flex;align-items:center;justify-content:center}
.icon.accent{background:hsl(40 60% 88%);color:hsl(40 88% 35%)}
.icon.warning{background:hsl(30 70% 88%);color:hsl(30 80% 35%)}
.trend{display:inline-flex;gap:3px;align-items:center;font-size:12px;font-weight:600;margin-top:6px;color:hsl(158 56% 30%)}
</style></head><body>
<div class="row">
  <div class="card">
    <div class="top">
      <div>
        <div class="lab">Global inventory</div>
        <div class="val">12,480</div>
        <div class="sub">bottles on hand</div>
        <div class="trend">▲ +8%</div>
      </div>
      <div class="icon">
        <svg width="18" height="18" stroke="currentColor" stroke-width="1.75" fill="none" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      </div>
    </div>
  </div>
  <div class="card accent">
    <div class="top">
      <div>
        <div class="lab">30d sell-through</div>
        <div class="val">42%</div>
        <div class="sub">vs available pool</div>
      </div>
      <div class="icon accent">
        <svg width="18" height="18" stroke="currentColor" stroke-width="1.75" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20M12 2a14.5 14.5 0 0 1 0 20M2 12h20"/></svg>
      </div>
    </div>
  </div>
  <div class="card warning">
    <div class="top">
      <div>
        <div class="lab">Low-stock markets</div>
        <div class="val">3</div>
        <div class="sub">need attention</div>
      </div>
      <div class="icon warning">
        <svg width="18" height="18" stroke="currentColor" stroke-width="1.75" fill="none" viewBox="0 0 24 24"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
    </div>
  </div>
</div></body></html>
