<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hajime — Sales Rep · Mike Tan · Detail Flow</title>
<link rel="stylesheet" href="colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-body);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
.shell{display:grid;grid-template-columns:260px 1fr;height:100vh;overflow:hidden}

/* Sidebar */
.side{background:hsl(var(--sidebar-background));color:hsl(var(--sidebar-foreground));display:flex;flex-direction:column;border-right:1px solid hsl(var(--sidebar-border));overflow-y:auto;scrollbar-width:none}
.side::-webkit-scrollbar{display:none}
.logo-row{display:flex;align-items:center;gap:10px;padding:20px 16px 16px;border-bottom:1px solid hsl(var(--sidebar-border));flex-shrink:0}
.logo-mark{width:34px;height:34px;border-radius:8px;background:hsl(var(--sidebar-accent));display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.logo-mark img{height:26px;filter:brightness(0) invert(1)}
.quota-pill{margin:14px 10px 0;background:linear-gradient(135deg,hsl(40 88%42%/.1),hsl(40 60%50%/.06));border:1px solid hsl(40 88%42%/.22);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.q-ring{position:relative;width:44px;height:44px;flex-shrink:0}
.q-ring svg{width:44px;height:44px}
.q-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:600;color:hsl(40 80%62%)}
.nav-s{padding:14px 10px 6px;display:flex;flex-direction:column;gap:2px}
.nav-l{padding:4px 8px 6px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--sidebar-foreground)/.32)}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;color:hsl(var(--sidebar-foreground)/.68);font-size:13px;cursor:pointer;transition:background 140ms,color 140ms;user-select:none}
.ni:hover{background:hsl(var(--sidebar-accent));color:hsl(35 14%90%)}
.ni.active{background:hsl(var(--sidebar-accent));color:hsl(var(--sidebar-primary));font-weight:500}
.ni svg{width:15px;height:15px;flex-shrink:0}
.nb{margin-left:auto;font-size:10px;font-weight:600;padding:1px 6px;border-radius:999px;font-family:var(--font-mono)}
.nb-g{background:hsl(40 88%42%/.18);color:hsl(40 88%42%)}
.nb-gr{background:hsl(158 56%36%/.15);color:hsl(158 56%32%)}
.nb-r{background:hsl(0 68%48%/.14);color:hsl(0 68%42%)}
.side-div{height:1px;background:hsl(var(--sidebar-border));margin:4px 10px 10px}
.side-foot{margin-top:auto;padding:12px 10px;border-top:1px solid hsl(var(--sidebar-border));display:flex;align-items:center;gap:10px;flex-shrink:0}
.av{width:30px;height:30px;border-radius:999px;background:hsl(var(--sidebar-accent));color:hsl(35 14%82%);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}

/* Main */
.main{display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
.topbar{height:54px;display:flex;align-items:center;padding:0 32px;gap:14px;background:hsl(var(--glass-bg));backdrop-filter:blur(12px) saturate(1.4);border-bottom:1px solid hsl(var(--border)/.6);flex-shrink:0;z-index:10}
.crumbs{font-size:13px;color:hsl(var(--muted-foreground));display:flex;align-items:center;gap:6px}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:10px}
#pg{overflow-y:auto;flex:1}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;border-radius:8px;padding:0 16px;height:36px;border:1px solid transparent;cursor:pointer;transition:background 140ms,transform 100ms,box-shadow 140ms;font-family:var(--font-body);white-space:nowrap}
.btn:active{transform:scale(.98)}
.btn-accent{background:hsl(var(--accent));color:hsl(var(--accent-foreground))}
.btn-accent:hover{background:hsl(var(--accent-hover))}
.btn-outline{background:hsl(var(--background));border-color:hsl(var(--border));color:hsl(var(--foreground))}
.btn-outline:hover{background:hsl(var(--muted))}
.btn-ink{background:hsl(var(--primary));color:hsl(var(--primary-foreground))}
.btn-ink:hover{background:hsl(24 10%16%)}
.btn-green{background:hsl(158 56%36%);color:white}
.btn-green:hover{background:hsl(158 56%30%)}
.btn-sm{height:30px;font-size:12px;padding:0 12px}
.btn-xs{height:26px;font-size:11px;padding:0 10px;border-radius:6px}
.btn svg{width:14px;height:14px}

/* Layout */
.pw{padding:28px 36px 80px;max-width:1280px}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px}
.pg-h1{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.pg-sub{font-size:13px;color:hsl(var(--muted-foreground));line-height:1.6}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.sec-t{font-family:var(--font-display);font-size:18px;font-weight:500;letter-spacing:-.01em}
.sec-lnk{font-size:12px;color:hsl(var(--accent));cursor:pointer;font-weight:500}
.sec-lnk:hover{text-decoration:underline}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.kpi{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow-soft);transition:box-shadow 200ms,transform 200ms}
.kpi:hover{box-shadow:var(--shadow-lifted);transform:translateY(-1px)}
.kpi-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.kpi-ic svg{width:17px;height:17px}
.ic-g{background:hsl(40 88%42%/.1);color:hsl(40 88%36%)}
.ic-gr{background:hsl(158 56%36%/.1);color:hsl(158 56%30%)}
.ic-b{background:hsl(215 72%50%/.1);color:hsl(215 72%42%)}
.ic-ink{background:hsl(24 10%10%/.07);color:hsl(24 10%18%)}
.kpi-lab{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--muted-foreground));font-weight:500}
.kpi-val{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.1;font-feature-settings:'tnum'}
.kpi-sub{font-size:12px;color:hsl(var(--muted-foreground));margin-top:2px}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;margin-top:2px}
.d-up{color:hsl(158 56%32%)}
.d-dn{color:hsl(0 68%44%)}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:500;border:1px solid;white-space:nowrap}
.pdot{width:6px;height:6px;border-radius:999px}
.p-gr{background:hsl(158 56%36%/.08);color:hsl(158 56%26%);border-color:hsl(158 56%36%/.2)}
.p-bl{background:hsl(215 72%50%/.08);color:hsl(215 72%38%);border-color:hsl(215 72%50%/.2)}
.p-am{background:hsl(38 90%50%/.1);color:hsl(30 80%30%);border-color:hsl(38 90%50%/.25)}
.p-rd{background:hsl(0 68%48%/.08);color:hsl(0 68%38%);border-color:hsl(0 68%48%/.2)}
.p-nt{background:hsl(var(--muted));color:hsl(var(--muted-foreground));border-color:hsl(var(--border))}

/* Cards */
.card{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-soft)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid hsl(var(--border)/.5)}
.card-t{font-size:14px;font-weight:600}
.card-s{font-size:12px;color:hsl(var(--muted-foreground));margin-top:2px}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:hsl(var(--muted-foreground));font-weight:600;padding:10px 16px;background:hsl(var(--muted)/.5);border-bottom:1px solid hsl(var(--border)/.5)}
.tbl td{padding:12px 16px;border-bottom:1px solid hsl(var(--border)/.4);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:background 120ms}
.tbl tbody tr:hover td{background:hsl(var(--muted)/.3)}

/* Filter bar */
.filter-bar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.fb-btn{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid hsl(var(--border));background:hsl(var(--background));color:hsl(var(--muted-foreground));cursor:pointer;transition:all 140ms;font-family:var(--font-body)}
.fb-btn.active{background:hsl(var(--primary));color:hsl(var(--primary-foreground));border-color:hsl(var(--primary))}
.fb-btn:hover:not(.active){background:hsl(var(--muted));color:hsl(var(--foreground))}
.srch-w{position:relative;flex:1;max-width:280px;margin-left:auto}
.srch-w input{width:100%;height:34px;padding:0 12px 0 34px;border-radius:8px;border:1px solid hsl(var(--border));background:hsl(var(--background));font-size:13px;font-family:var(--font-body);color:hsl(var(--foreground));outline:none}
.srch-w input:focus{border-color:hsl(var(--ring))}
.srch-w svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:hsl(var(--muted-foreground));pointer-events:none}

/* Two col */
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-bottom:26px}

/* Signal tags */
.sig-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:500}
.st-slip{background:hsl(38 90%50%/.1);color:hsl(30 80%30%)}
.st-cad{background:hsl(158 56%36%/.08);color:hsl(158 56%26%)}
.st-opp{background:hsl(215 72%50%/.08);color:hsl(215 72%38%)}
.st-pro{background:hsl(var(--muted));color:hsl(var(--muted-foreground))}
.sdot{width:6px;height:6px;border-radius:999px;flex-shrink:0}

/* Store portal badge */
.portal-badge{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;border:1px solid hsl(215 72%50%/.2);background:hsl(215 72%50%/.04);margin-bottom:20px}
.portal-dot{width:8px;height:8px;border-radius:999px;flex-shrink:0}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:26px}
.kol-head{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.kol-cnt{background:hsl(var(--muted));color:hsl(var(--muted-foreground));font-size:10px;padding:1px 6px;border-radius:999px;font-family:var(--font-mono)}
.kcard{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:10px;padding:14px;cursor:pointer;transition:box-shadow 150ms,transform 150ms;margin-bottom:8px}
.kcard:hover{box-shadow:var(--shadow-lifted);transform:translateY(-1px)}
.age-ok{background:hsl(158 56%36%/.1);color:hsl(158 56%28%)}
.age-w{background:hsl(38 90%50%/.1);color:hsl(30 80%30%)}
.age-l{background:hsl(0 68%48%/.1);color:hsl(0 68%38%)}

/* Route */
.route-stop{display:flex;gap:16px;padding:20px 0;border-bottom:1px solid hsl(var(--border)/.4)}
.route-stop:last-child{border-bottom:none}
.stop-num{width:36px;height:36px;border-radius:999px;background:hsl(var(--primary));color:hsl(var(--primary-foreground));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px}
.stop-num.done{background:hsl(158 56%36%)}
.stop-num.current{background:hsl(40 88%42%);color:white}

/* SKU / Cart */
.sku-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.sku-card{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:12px;padding:16px;transition:border-color 200ms,box-shadow 200ms}
.sku-card.in-cart{border-color:hsl(40 88%42%/.5);box-shadow:0 0 0 2px hsl(40 88%42%/.1)}
.qty-ctrl{display:flex;align-items:center;gap:8px;margin-top:12px}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1px solid hsl(var(--border));background:hsl(var(--background));display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;line-height:1;transition:background 140ms}
.qty-btn:hover{background:hsl(var(--muted))}
.qty-val{font-family:var(--font-mono);font-size:13px;font-weight:600;min-width:24px;text-align:center}
.cart-panel{background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;padding:20px;position:sticky;top:24px}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid hsl(var(--border)/.4)}
.cart-item:last-child{border-bottom:none}

/* Inv bars */
.inv-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid hsl(var(--border)/.4)}
.inv-row:last-child{border-bottom:none}
.fill-red{background:hsl(0 68%48%)}
.fill-amber{background:hsl(38 90%50%)}
.fill-green{background:hsl(158 56%36%)}

/* Activity feed */
.act-row{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid hsl(var(--border)/.4)}
.act-row:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:999px;flex-shrink:0;margin-top:4px}

/* Form */
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.fg label{font-size:11px;font-weight:500;color:hsl(var(--muted-foreground));text-transform:uppercase;letter-spacing:.08em}
.fg input,.fg select,.fg textarea{padding:0 12px;border-radius:8px;border:1px solid hsl(var(--border));background:hsl(var(--background));font-size:13px;font-family:var(--font-body);color:hsl(var(--foreground));outline:none;height:38px;transition:border-color 140ms}
.fg textarea{height:auto;padding:10px 12px;resize:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:hsl(var(--ring))}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Inc header */
.inc-hd{background:linear-gradient(135deg,hsl(24 12%9%),hsl(24 14%13%));padding:24px 28px;display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;position:relative;overflow:hidden}
.inc-hd::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 100% at 100% 50%,hsl(40 88%42%/.1),transparent);pointer-events:none}

@keyframes enterUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.enter{animation:enterUp 400ms var(--ease-out-expo) both}
.d1{animation-delay:50ms}.d2{animation-delay:100ms}.d3{animation-delay:150ms}.d4{animation-delay:200ms}
</style>

<body>
<div class="shell">

<aside class="side">
  <div class="logo-row">
    <div class="logo-mark"><img src="assets/hajime-logo.png" alt="Hajime"></div>
    <div>
      <div style="font-family:var(--font-display);font-weight:600;font-size:16px;color:hsl(35 14%90%);line-height:1.2">Hajime</div>
      <div style="font-size:10px;color:hsl(35 12%42%);letter-spacing:.08em;margin-top:1px">Sales Rep · NYC</div>
    </div>
  </div>
  <div style="padding:14px 10px 0">
    <div class="quota-pill">
      <div class="q-ring">
        <svg viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="18" stroke="hsl(35 12%20%)" stroke-width="4"/><circle cx="22" cy="22" r="18" stroke="url(#qg)" stroke-width="4" stroke-linecap="round" stroke-dasharray="69.2 113.1" transform="rotate(-90 22 22)"/><defs><linearGradient id="qg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="hsl(40,88%,42%)"/><stop offset="100%" stop-color="hsl(32,78%,58%)"/></linearGradient></defs></svg>

function pill(type, label) {
  const c={green:'p-gr',blue:'p-bl',amber:'p-am',red:'p-rd',neutral:'p-nt'};

  return `<span class="pill ${c[type]||'p-nt'}"><span class="pdot" style="background:${d[type]||'grey'}"></span>${label}</span>`;
}
function sig(type){
  const c={slipping:'st-slip','on cadence':'st-cad',opportunity:'st-opp',prospect:'st-pro'};
  const d={slipping:'hsl(38 90%50%)','on cadence':'hsl(158 56%36%)',opportunity:'hsl(215 72%50%)',prospect:'hsl(var(--muted-foreground))'};
  return `<span class="sig-tag ${c[type]||'st-pro'}"><span class="sdot" style="background:${d[type]||'grey'}"></span>${type}</span>`;
}
function kpi(icp,icCls,lab,val,sub='',delta=''){
  return `<div class="kpi"><div class="kpi-ic ${icCls}">${ic(icp,17)}</div><div class="kpi-lab">${lab}</div><div class="kpi-val">${val}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}${delta}</div>`;
}

function nav(id,sub=null){
  const activeNav=id==='account'?'accounts':id==='draft-builder'?'drafts':id;
  document.querySelectorAll('[data-nav]').forEach(el=>el.classList.toggle('active',el.dataset.nav===activeNav));
  const crumbs=$('crumbs');
  if(sub){
    crumbs.innerHTML=`<span style="cursor:pointer;color:hsl(var(--accent))" onclick="nav('${id}')">${LABELS[id]||id}</span> <span style="color:hsl(var(--border))">›</span> <strong>${sub}</strong>`;
  } else {
    crumbs.innerHTML=`<strong>${LABELS[id]||id}</strong>`;
  }
  const pg=$('pg');
  const fn=PAGES[id];
  pg.innerHTML=fn?fn(sub):'<div class="pw"><p>Page not found.</p></div>';
  pg.scrollTop=0;
  bind();
  if($('cart-items'))renderCart();
}

  });
  document.querySelectorAll('[data-qty]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.qty,dir=el.dataset.dir;
      cart[id]=(cart[id]||0)+(dir==='up'?1:-1);
      if(cart[id]<=0)delete cart[id];
      renderCart();updateSkuCards();
    };
  });
}

function startOrder(acctName){
  cart={};draftAcct=acctName;
  if(acctName){
    const a=ACCTS.find(x=>x.n===acctName);
    if(a)a.inventory.forEach(i=>{const r=Math.max(0,i.par-i.onHand);if(r>0)cart[i.sku]=r;});
  }
  nav('draft-builder',acctName);
}

function renderCart(){
  const items=$('cart-items'),footer=$('cart-footer');
  if(!items)return;
  const entries=Object.entries(cart);
  if(!entries.length){items.innerHTML='<div style="font-size:13px;color:hsl(var(--muted-foreground));text-align:center;padding:20px 0">No items added yet</div>';if(footer)footer.style.display='none';return;}
  let total=0;
  items.innerHTML=entries.map(([id,qty])=>{const p=PRODUCTS.find(x=>x.id===id);if(!p)return'';const sub=qty*p.price;total+=sub;return`<div class="cart-item"><div><div style="font-size:13px;font-weight:500">${p.name} ${p.fmt}</div><div style="font-size:11px;color:hsl(var(--muted-foreground))">${qty} × $${p.price}</div></div><div style="font-family:var(--font-mono);font-size:13px;font-weight:500">$${sub.toLocaleString()}</div></div>`;}).join('');
  if($('cart-total'))$('cart-total').textContent='$'+total.toLocaleString();
  const comm=Math.round(total*0.10);
  if($('cart-comm'))$('cart-comm').textContent=`~$${comm.toLocaleString()} commission at 10%`;
  if(footer)footer.style.display='block';
}

function updateSkuCards(){
  PRODUCTS.forEach(p=>{
    const q=$('qty-'+p.id),card=document.getElementById('sku-'+p.id);
    if(q)q.textContent=cart[p.id]||0;
    if(card)card.classList.toggle('in-cart',(cart[p.id]||0)>0);
  });
}

  <div style="background:hsl(var(--card));border:1px solid hsl(var(--border)/.7);border-radius:14px;padding:24px;margin-bottom:24px;box-shadow:var(--shadow-soft)">

      ${weeks.map(w=>`
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:4px">
        <div style="font-size:10px;color:hsl(var(--foreground));font-weight:500">$${(w.v/1000).toFixed(0)}k</div>
        <div style="width:100%;border-radius:4px 4px 0 0;background:${w.w.includes('May')?'hsl(40 88%42%)':'hsl(40 88%42%/.35)'};height:${(w.v/maxV*100)}%" title="${w.w}: $${w.v.toLocaleString()}"></div>
      </div>`).join('')}
    </div>
    <div style="display:flex;align-items:flex-end;gap:5px;padding:0 4px">
      ${weeks.map(w=>`<div style="flex:1;text-align:center;font-size:9px;color:hsl(var(--muted-foreground));font-family:var(--font-mono);line-height:1.3">${w.w.replace(' ','<br>')}</div>`).join('')}
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <div class="card">
      <div class="card-head"><div class="card-t">Account performance</div><div class="card-s">Q2 revenue ranked</div></div>

        ${[{n:'The Aviary',v:5760,max:6000},{n:'Dante',v:3840,max:6000},{n:'Gramercy Tavern',v:2880,max:6000},{n:'Balthazar',v:2200,max:6000},{n:'Katana Kitten',v:2100,max:6000},{n:'Mace',v:1680,max:6000},{n:'Bar Suntory',v:1440,max:6000}].map(a=>`
        <div style="display:flex;align-items:center;gap:14px;padding:11px 20px;border-bottom:1px solid hsl(var(--border)/.4);cursor:pointer;transition:background 120ms" data-goto="account:${a.n}" onmouseover="this.style.background='hsl(var(--muted)/.4)'" onmouseout="this.style.background=''">
          <div style="font-size:13px;font-weight:500;width:130px;flex-shrink:0">${a.n}</div>
          <div style="flex:1;height:8px;border-radius:999px;background:hsl(var(--muted));overflow:hidden"><div style="height:100%;border-radius:999px;width:${(a.v/a.max*100)}%;background:hsl(40 88%42%)"></div></div>
          <div style="font-family:var(--font-mono);font-size:12px;font-weight:500;min-width:52px;text-align:right">$${(a.v/1000).toFixed(1)}k</div>
        </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:18px">
      <div class="card">
        <div class="card-head"><div class="card-t">Product velocity</div><div class="card-s">Sell-through by SKU · Q2</div></div>
        <div>
          ${[{n:'Florin Peaks 750ml',v:342,pct:84,c:'158 56%36%'},{n:'Ryusui Reserve 750ml',v:78,pct:62,c:'215 72%50%'},{n:'Junmai Shiro 750ml',v:56,pct:45,c:'215 72%50%'},{n:'Florin Peaks 375ml',v:144,pct:55,c:'215 72%50%'}].map(p=>`
          <div style="padding:11px 20px;border-bottom:1px solid hsl(var(--border)/.4)">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;font-weight:500">${p.n}</span><span style="font-family:var(--font-mono);font-size:11px">${p.v} btls · ${p.pct}%</span></div>
            <div style="height:6px;border-radius:999px;background:hsl(var(--muted));overflow:hidden"><div style="height:100%;border-radius:999px;width:${p.pct}%;background:hsl(${p.c})"></div></div>
          </div>`).join('')}

      </div>
      <div class="card">
        <div class="card-head"><div class="card-t">Pipeline funnel</div></div>

          <div>

            <div style="width:${f.w}%;height:10px;border-radius:4px;background:hsl(40 88%42%/${f.w/100})"></div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>
</div>`;};
